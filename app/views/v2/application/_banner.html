<h2 class="govuk-heading-m govuk-!-margin-bottom-1">
  {{ application.orgName }}
  <span class="govuk-caption-m govuk-!-display-inline">({{ application.orgId }})</span>
</h2>

<dl class="app-service-banner__meta">
  <dt>Status:</dt>
    <dd>{{ application.status }}</dd>
  {% if not application.complete %}
  <dt>Assigned to:</dt>
    <dd>{{ application.owner | d('Unassigned') | title }}</dd>
  <dt>Due on:</dt>
    <dd>{{ application.due | date('D MMMM YYYY') }}</dd>
  {% endif %}
</dl>
